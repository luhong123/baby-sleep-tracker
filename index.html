<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#007AFF">
    <title>宝宝睡眠记录</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>宝宝睡眠</h1>
            <p class="subtitle">记录宝宝每天的睡眠时光</p>
        </header>

        <!-- 统计卡片 -->
        <div class="card stats-card">
            <h2>睡眠统计</h2>
            <div class="stats-summary">
                <div class="stat-item">
                    <div class="stat-label">总记录数</div>
                    <div class="stat-value" id="totalRecords">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">平均睡眠</div>
                    <div class="stat-value" id="avgDuration">0小时</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">最长睡眠</div>
                    <div class="stat-value" id="maxDuration">0小时</div>
                </div>
            </div>
            <div class="week-stats" id="weekStats" style="display:none;">
                <div class="week-stats-title">本周概览</div>
                <div class="week-stats-grid">
                    <div class="week-stat-item">
                        <div class="week-stat-label">本周天数</div>
                        <div class="week-stat-value" id="weekDays">0天</div>
                    </div>
                    <div class="week-stat-item">
                        <div class="week-stat-label">本周平均</div>
                        <div class="week-stat-value" id="weekAvg">0小时</div>
                    </div>
                    <div class="week-stat-item">
                        <div class="week-stat-label">夜间睡眠</div>
                        <div class="week-stat-value" id="weekNight">0小时</div>
                    </div>
                </div>
            </div>
            <div class="chart-controls">
                <button class="chart-period active" data-period="7">7天</button>
                <button class="chart-period" data-period="14">14天</button>
                <button class="chart-period" data-period="30">30天</button>
                <button class="chart-period" data-period="all">全部</button>
            </div>
            <div class="chart-container">
                <canvas id="sleepChart"></canvas>
            </div>
        </div>

        <!-- 记录列表 -->
        <div class="records-section">
            <div class="section-header">
                <h2>睡眠记录</h2>
                <div class="header-actions">
                    <button id="exportData" class="btn-text">导出</button>
                    <button id="importData" class="btn-text">导入</button>
                    <button id="clearAll" class="btn-text danger">清空</button>
                </div>
            </div>
            <div id="recordsList" class="records-list">
                <div class="empty-state">
                    <p>还没有睡眠记录</p>
                    <p class="empty-hint">添加第一条记录开始追踪宝宝的睡眠吧</p>
                </div>
            </div>
        </div>

        <!-- 添加记录 -->
        <div class="card add-record-card">
            <h2>添加睡眠记录</h2>
            <form id="sleepForm">
                <div class="quick-actions">
                    <button type="button" id="quickSleep" class="btn-quick">😴 记录入睡</button>
                    <button type="button" id="quickWake" class="btn-quick">☀️ 记录醒来</button>
                </div>

                <div class="form-group">
                    <label>睡眠类型</label>
                    <div class="type-selector">
                        <label class="type-option">
                            <input type="radio" name="sleepType" value="night" checked>
                            <span>🌙 夜间睡眠</span>
                        </label>
                        <label class="type-option">
                            <input type="radio" name="sleepType" value="nap">
                            <span>☀️ 白天小睡</span>
                        </label>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="date">日期</label>
                        <input type="date" id="date" required>
                    </div>
                </div>

                <div class="form-row two-cols">
                    <div class="form-group">
                        <label for="sleepTime">入睡时间</label>
                        <input type="time" id="sleepTime" required>
                    </div>
                    <div class="form-group">
                        <label for="wakeTime">醒来时间</label>
                        <input type="time" id="wakeTime" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="note">备注（可选）</label>
                    <input type="text" id="note" placeholder="睡得好吗？醒了几次？">
                </div>

                <button type="submit" class="btn-primary">保存记录</button>
            </form>
        </div>
    </div>

    <!-- Toast 通知 -->
    <div id="toast" class="toast"></div>

    <!-- 确认弹窗 -->
    <div id="dialogOverlay" class="dialog-overlay" style="display:none;">
        <div class="dialog-box">
            <div class="dialog-title" id="dialogTitle">确认</div>
            <div class="dialog-message" id="dialogMessage">确定要执行此操作吗？</div>
            <div class="dialog-actions">
                <button class="dialog-btn cancel" id="dialogCancel">取消</button>
                <button class="dialog-btn confirm" id="dialogConfirm">确定</button>
            </div>
        </div>
    </div>

    <!-- 编辑弹窗 -->
    <div id="editOverlay" class="dialog-overlay" style="display:none;">
        <div class="dialog-box full">
            <div class="dialog-title">编辑记录</div>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>睡眠类型</label>
                    <div class="type-selector">
                        <label class="type-option">
                            <input type="radio" name="editType" value="night" checked>
                            <span>🌙 夜间睡眠</span>
                        </label>
                        <label class="type-option">
                            <input type="radio" name="editType" value="nap">
                            <span>☀️ 白天小睡</span>
                        </label>
                    </div>
                </div>
                <div class="form-row two-cols">
                    <div class="form-group">
                        <label for="editSleepTime">入睡时间</label>
                        <input type="time" id="editSleepTime" required>
                    </div>
                    <div class="form-group">
                        <label for="editWakeTime">醒来时间</label>
                        <input type="time" id="editWakeTime" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="editNote">备注</label>
                    <input type="text" id="editNote" placeholder="可选">
                </div>
                <div class="dialog-actions">
                    <button type="button" class="dialog-btn cancel" id="editCancel">取消</button>
                    <button type="submit" class="dialog-btn confirm">保存</button>
                </div>
            </form>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".json" style="display:none;">

    <script src="script.js"></script>
</body>
</html>
