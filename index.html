<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宝宝睡眠记录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>宝宝睡眠记录</h1>
            <p class="subtitle">记录宝宝每天的睡眠时光</p>
        </header>

        <div class="card stats-card">
            <h2>睡眠统计</h2>
            <div class="stats-summary">
                <div class="stat-item">
                    <div class="stat-label">总记录数</div>
                    <div class="stat-value" id="totalRecords">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">平均睡眠</div>
                    <div class="stat-value" id="avgDuration">0小时</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">最长睡眠</div>
                    <div class="stat-value" id="maxDuration">0小时</div>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="sleepChart"></canvas>
            </div>
        </div>

        <div class="card add-record-card">
            <h2>添加睡眠记录</h2>
            <form id="sleepForm">
                <div class="form-group">
                    <label for="date">日期</label>
                    <input type="date" id="date" required>
                </div>

                <div class="form-group">
                    <label for="sleepTime">入睡时间</label>
                    <input type="time" id="sleepTime" required>
                </div>

                <div class="form-group">
                    <label for="wakeTime">醒来时间</label>
                    <input type="time" id="wakeTime" required>
                </div>

                <div class="form-group">
                    <label for="note">备注（可选）</label>
                    <input type="text" id="note" placeholder="例如：睡得很香，中间醒了一次">
                </div>

                <button type="submit" class="btn-primary">保存记录</button>
            </form>
        </div>

        <div class="records-section">
            <div class="section-header">
                <h2>睡眠记录</h2>
                <button id="clearAll" class="btn-text">清空所有</button>
            </div>
            <div id="recordsList" class="records-list">
                <div class="empty-state">
                    <p>还没有睡眠记录</p>
                    <p class="empty-hint">添加第一条记录开始追踪宝宝的睡眠吧</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
